<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Matafuegos</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <h1 class="text-2xl font-bold">🧯 Control de Matafuegos</h1>
    </nav>

    <main class="p-8">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl mb-4 font-semibold">Lista de Matafuegos</h2>
            
            <button hx-get="/matafuegos/tabla" 
                    hx-target="#lista-matafuegos" 
                    class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                Cargar Matafuegos
            </button>

            <div id="lista-matafuegos" class="mt-6">
                </div>
        </div>
    </main>
</body>
</html>
