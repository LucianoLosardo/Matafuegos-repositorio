<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Matafuegos</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8"> 

    <div class="max-w-5xl mx-auto mb-6 flex justify-end print:hidden">
        <a href="/clientes" 
           class="bg-teal-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-teal-700 transition-colors shadow-sm flex items-center gap-2">
            👥 Gestión de Clientes
        </a>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md max-w-5xl mx-auto print:hidden">
        <h2 class="text-xl mb-4 font-semibold text-blue-600">➕ Registrar Nuevo Matafuego</h2>
        
        <form hx-post="/matafuegos" 
              hx-target="#mensaje-respuesta"
              hx-swap="innerHTML"
              hx-on:matafuego-guardado="this.reset()"
              class="grid grid-cols-1 md:grid-cols-3 gap-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">N° de Serie</label>
                <input type="text" name="numero_serie" required 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                <select name="tipo" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="ABC">Polvo ABC</option>
                    <option value="CO2">CO2</option>
                    <option value="Agua">HCFC</option>
                    <option value="Espuma">AFFF</option>
                    <option value="Espuma">K</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Capacidad (ej: 5kg)</label>
                <input type="text" name="capacidad" required 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Recarga</label>
                <input type="date" name="fecha_ultima_recarga" required 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Año de Fabricación/PH</label>
                <input type="number" name="anio_matafuego" required 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ID del Cliente</label>
                <input type="number" name="id_cliente" required 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="md:col-span-3 mt-2 flex items-center justify-between">
                <button type="submit" 
                        class="text-white px-4 py-2 rounded shadow-sm bg-blue-500 transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 hover:bg-indigo-500">
                    💾 Guardar Matafuego
                </button>
                
                <div id="mensaje-respuesta" class="text-green-600 font-semibold"></div>
            </div>
        </form>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md mt-8 max-w-5xl mx-auto">
        <h2 class="text-xl mb-4 font-semibold text-gray-800 print:hidden">Búsqueda y Filtros</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
            
            <form hx-get="/matafuegos/tabla" hx-target="#lista-matafuegos" class="flex items-end gap-2 print:hidden">
                <div class="flex-1">
                    <label for="mes_busqueda" class="block text-sm font-medium text-gray-700 mb-1">
                        Vencidos al mes de:
                    </label>
                    <input type="month" id="mes_busqueda" name="mes_busqueda" 
                           class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
                <button type="submit" class="text-white px-4 py-2 rounded shadow-sm bg-red-500 transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 hover:bg-red-600">
                    🔍 Mes
                </button>   
            </form>

            <form hx-get="/matafuegos/tabla" hx-target="#lista-matafuegos" class="flex items-end gap-2 print:hidden">
                <div class="flex-1">
                    <label for="nombre_cliente" class="block text-sm font-medium text-gray-700 mb-1">
                        Buscar por Nombre de Cliente:
                    </label>
                    <input type="text" id="nombre_cliente" name="nombre_cliente" placeholder="Ej: Luciano Ingenieria" 
                           class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <button type="submit" class="text-white px-4 py-2 rounded shadow-sm bg-red-500 transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 hover:bg-red-600">
                    🔍 Cliente
                </button>
            </form>

        </div>

        <div class="flex justify-between items-center mb-6 border-b pb-4 border-gray-200 print:hidden">
            <button type="button" 
                onclick="window.print()"
                class="text-gray-700 bg-gray-200 border border-gray-300 px-4 py-2 rounded shadow-sm transition hover:bg-gray-300 flex items-center gap-2 font-semibold">
                🖨️ Imprimir Lista
            </button>

            <button type="button" 
                hx-get="/matafuegos/tabla" 
                hx-target="#lista-matafuegos"
                class="text-white px-4 py-2 rounded shadow-sm bg-blue-500 transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 hover:bg-indigo-500">
                📋 Ver Todos los Matafuegos
            </button>
        </div>

        <div id="lista-matafuegos" class="overflow-x-auto">
            <p class="text-gray-500 italic">Utiliza los buscadores de arriba para filtrar los datos.</p>
        </div>
    </div>

</body>
</html>
