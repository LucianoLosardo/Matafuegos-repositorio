<table class="min-w-full bg-white border border-gray-300 shadow-sm rounded-lg overflow-hidden">
    <thead class="bg-gray-800 text-white">
        <tr>
            <th class="py-3 px-4 text-left font-semibold">ID</th>
            <th class="py-3 px-4 text-left font-semibold">Nombre</th>
            <th class="py-3 px-4 text-left font-semibold">DNI</th>
            <th class="py-3 px-4 text-left font-semibold">Dirección</th>
            <th class="py-3 px-4 text-left font-semibold">Email</th>
            <th class="py-3 px-4 text-left font-semibold">Teléfono</th>
        </tr>
    </thead>
    <tbody class="text-gray-700">
        {% for cliente in clientes %}
        <tr class="border-b hover:bg-gray-50 transition-colors">
            <td class="py-3 px-4">{{ cliente.id }}</td>
            <td class="py-3 px-4 font-medium">{{ cliente.nombre }}</td>
            <td class="py-3 px-4">{{ cliente.dni }}</td>
            <td class="py-3 px-4">{{ cliente.direccion or '-' }}</td>
            <td class="py-3 px-4">{{ cliente.email or '-' }}</td>
            <td class="py-3 px-4">{{ cliente.telefono or '-' }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="6" class="py-6 text-center text-gray-500">
                No hay clientes registrados en la base de datos.
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
