<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clientes</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8"> 

    <div class="max-w-5xl mx-auto mb-6 flex justify-start">
        <a href="/" 
           class="bg-teal-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-teal-700 transition-colors shadow-sm flex items-center gap-2 print:hidden">
            ⬅️ Volver a Matafuegos
        </a>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md max-w-5xl mx-auto print:hidden">
        <h2 class="text-xl mb-4 font-semibold text-teal-600">➕ Registrar Nuevo Cliente</h2>
        
        <form hx-post="/clientes" 
              hx-target="#mensaje-respuesta"
              hx-swap="innerHTML"
              hx-on::after-request="this.reset()"
              class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre / Razón Social</label>
                <input type="text" name="nombre" required 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">DNI / CUIT</label>
                <input type="text" name="dni" 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                <input type="text" name="telefono" 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                <input type="text" name="direccion" 
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <div class="md:col-span-2 mt-2 flex items-center justify-between">
                <button type="submit" 
                        class="text-white px-4 py-2 rounded shadow-sm bg-teal-500 transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 hover:bg-teal-600">
                    💾 Guardar Cliente
                </button>
                
                <div id="mensaje-respuesta" class="text-green-600 font-semibold"></div>
            </div>
        </form>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md mt-8 max-w-5xl mx-auto">
        <h2 class="text-xl mb-4 font-semibold text-gray-800 print:hidden">Búsqueda y Directorio</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
            
            <form hx-get="/clientes/tabla" hx-target="#lista-clientes" class="flex items-end gap-2 md:col-span-1 print:hidden">
                <div class="flex-1">
                    <label for="nombre_busqueda" class="block text-sm font-medium text-gray-700 mb-1">
                        Buscar por Nombre / Razón Social:
                    </label>
                    <input type="text" id="nombre_busqueda" name="nombre_busqueda" placeholder="Ej: Juan Pérez" 
                           class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <button type="submit" class="text-white px-4 py-2 rounded shadow-sm bg-red-500 transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 hover:bg-red-600">
                    🔍 Buscar
                </button>
            </form>
        </div>

        <div class="flex justify-between items-center mb-6 border-b pb-4 border-gray-200 print:hidden">
            <button type="button" 
                onclick="window.print()"
                class="text-gray-700 bg-gray-200 border border-gray-300 px-4 py-2 rounded shadow-sm transition hover:bg-gray-300 flex items-center gap-2 font-semibold">
                🖨️ Imprimir Lista
            </button>

            <button type="button" 
                hx-get="/clientes/tabla" 
                hx-target="#lista-clientes"
                class="text-white px-4 py-2 rounded shadow-sm bg-blue-500 transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 hover:bg-indigo-500">
                📋 Ver Todos los Clientes
            </button>
        </div>

        <div id="lista-clientes" class="overflow-x-auto">
            <p class="text-gray-500 italic">Utiliza el buscador de arriba o haz clic en "Ver Todos" para cargar los datos.</p>
        </div>
    </div>

</body>
</html>
